<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podwaffle</title>
  <meta name="description" content="Podwaffle Podcast Player">
  <meta name="theme-color" content="#f43f5e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="Podwaffle Podcast Player">
  <meta property="og:description" content="">
  <meta property="og:type" content="website">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bulma CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <!-- App CSS -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="has-dark-theme">
  <div id="app-layout" class="app-layout">
    <!-- Sidebar (desktop) -->
    <aside id="sidebar" class="sidebar"></aside>

    <!-- Main content -->
    <main id="main-content" class="main-content">
      <div class="loading-screen">
        <div class="loading-logo">
          <svg  width="60" height="60" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" fill="#f43f5e" opacity="0.15"/>
            <circle cx="24" cy="24" r="14" fill="#f43f5e" opacity="0.3"/>
            <circle cx="24" cy="24" r="6" fill="#f43f5e"/>
            <path d="M10 24 Q10 8 24 8" stroke="#f43f5e" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M38 24 Q38 8 24 8" stroke="#f43f5e" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
          <span class="loading-title">Podwaffle</span>
        </div>
        <div class="loading-spinner spin"></div>
      </div>
    </main>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav id="bottom-nav" class="bottom-nav"></nav>

  <!-- Player bar (always visible) -->
  <div id="player-bar" class="player-bar"></div>

  <!-- Queue panel (slide-up overlay) -->
  <div id="queue-panel" class="queue-panel" style="display:none"></div>

  <!-- Cast modal -->
  <div id="cast-modal" style="display:none"></div>

  <!-- Load scripts in correct order -->
  <script>
    /* Detect base path for HA add-on or reverse proxy deployment */
    (function() {
      const pathname = window.location.pathname;
      /* Examples: /api/hassio/... → /api/hassio, /local/podwaffle → /local/podwaffle, / → '' */
      let basePath = '';
      if (pathname !== '/' && !pathname.endsWith('/index.html')) {
        const pathSegments = pathname.split('/').filter(s => s && s !== 'index.html');
        if (pathSegments.length > 1) {
          basePath = '/' + pathSegments.slice(0, -1).join('/');
        }
      }
      window.APP_BASE_PATH = basePath;
      console.log('[app] Detected base path:', window.APP_BASE_PATH);
    })();
  </script>
  <script src="js/api.js"></script>
  <script src="js/cacheManager.js"></script>
  <script src="js/castClient.js"></script>
  <script src="js/syncManager.js"></script>
  <script src="js/backgroundSyncManager.js"></script>
  <script src="js/feedRefreshScheduler.js"></script>
  <script src="js/capacitorBackgroundTasks.js"></script>
  <script src="js/player.js"></script>
  <script src="js/components/nav.js"></script>
  <script src="js/components/episodeRow.js"></script>
  <script src="js/components/playerBar.js"></script>
  <script src="js/components/queue.js"></script>
  <script src="js/components/castModal.js"></script>
  <script src="js/views/podcasts.js"></script>
  <script src="js/views/podcastDetail.js"></script>
  <script src="js/views/inProgress.js"></script>
  <script src="js/views/discover.js"></script>
  <script src="js/views/history.js"></script>
  <script src="js/views/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
