<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PodWaffle</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #e53935;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      padding-top: env(safe-area-inset-top, 32px);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: var(--accent);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; fill: #fff; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 280px; margin: 0 auto 24px; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div>
    <div class="icon">
      <!-- Headphones icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3a9 9 0 0 0-9 9v5a3 3 0 0 0 3 3h1a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1H4.071A8.003 8.003 0 0 1 20 12h-3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h1a3 3 0 0 0 3-3v-5a9 9 0 0 0-9-9z"/>
      </svg>
    </div>
    <h1>PodWaffle</h1>
    <p>Can't reach the server. Make sure your PodWaffle server is running and you're on the same network.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>

  <script>
    // If running inside Capacitor and the server is reachable, this page
    // will be replaced automatically by the server URL configured in
    // capacitor.config.ts. This page is only shown when the server is
    // unreachable at app launch.
    document.querySelector('button').addEventListener('click', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
