services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"

  chapter-worker:
    build: .
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:4b
      WHISPER_MODEL: small.en
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      MAX_AUDIO_BYTES: "786432000"
    volumes:
      - whisper-models:/models/huggingface
    ports:
      - "8765:8765"

volumes:
  ollama-models:
  whisper-models:
